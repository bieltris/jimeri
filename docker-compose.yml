services:
  api:
    build:
      context: ./backend
    container_name: jimeri-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/jimeri?sslmode=disable
      ACCESS_TOKEN_SECRET: dev-access-secret
      APP_TIMEZONE: America/Sao_Paulo
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8081
      REFRESH_COOKIE_NAME: jimeri_refresh_token
      REFRESH_COOKIE_SECURE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: jimeri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jimeri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jimeri"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
