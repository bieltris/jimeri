app = "jimeri-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  HTTP_ADDR = ":8080"
  APP_TIMEZONE = "America/Sao_Paulo"
  REFRESH_COOKIE_NAME = "jimeri_refresh_token"
  REFRESH_COOKIE_SECURE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
